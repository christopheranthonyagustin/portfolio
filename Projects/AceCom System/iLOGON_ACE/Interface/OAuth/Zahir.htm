<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html>
<head>
<title>Zahir Interface</title>
<meta name="GENERATOR" content="Microsoft Visual Studio .NET 7.1">
<meta name=ProgId content=VisualStudio.HTML>
<meta name=Originator content="Microsoft Visual Studio .NET 7.1">

<script>
        window.onload = function () {
            let queryString = window.location.search
            console.log(window.frames["main"])
            let handler = window.frames["main"].location.href
            window.frames["main"].frameElement.src = `${handler}${queryString}`
        }
</script>

</head>
    <frameset rows="1" border="1" frameborder="0" frameSpacing="4">
        <!--<frame name="main" src="ZahirCallbackHandler.aspx?<%= Request.QueryString %>">-->
        <frame name="main" src="ZahirCallbackHandler.aspx">
            <noframes>
                <p id="p1">
                    This HTML frameset displays multiple Web pages. To view this frameset, use a
                    Web browser that supports HTML 4.0 and later.
                </p>
            </noframes>
    </frameset>
</html>
