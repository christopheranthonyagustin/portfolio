<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html>
<head>
    <title></title>
    <meta name="vs_targetSchema" content="http://schemas.microsoft.com/intellisense/ie5">
    <style type="text/css">
        .busybiz {
            position: absolute;
            height: 300%;
            width: 175%;
            top: 0;
            right: 0;
            left: 0;
            background-color: black;
            opacity: 0.001;
            z-index: 1000;
            user-select: none;
        }

        #LoaderPopup {
            top: 20%;
            left: 50%;
            position: absolute;
            background: white;
        }

        #text {
            position: absolute;
            font-size: 20px;
            font-style: normal;
            font-weight: bold;
            color: black;
            transform: translate(-50%,-50%);
            -ms-transform: translate(-50%,-50%);
            width: 350px;
            top: 80%;
            left: 52%;
        }

        #loader {
            color: steelblue;
            position: absolute;
            -webkit-transform: translateZ(0);
            -ms-transform: translateZ(0);
            transform: translateZ(0);
            -webkit-animation-delay: -0.16s;
            animation-delay: -0.16s;
        }

            #loader,
            #loader:before,
            #loader:after {
                background: steelblue;
                -webkit-animation: load1 0.5s infinite ease-in-out;
                animation: load1 1s infinite ease-in-out;
                width: 0.8em;
                height: 2.5em;
            }

                #loader:before,
                #loader:after {
                    position: absolute;
                    top: 0;
                    content: '';
                }

                #loader:before {
                    left: -1.2em;
                    -webkit-animation-delay: -0.32s;
                    animation-delay: -0.32s;
                }

                #loader:after {
                    left: 1.2em;
                }

        @-webkit-keyframes load1 {
            0%, 80%, 100% {
                box-shadow: 0 0;
                height: 3em;
            }

            40% {
                box-shadow: 0 -2em;
                height: 4em;
            }
        }

        @keyframes load1 {
            0%, 80%, 100% {
                box-shadow: 0 0;
                height: 4em;
            }

            40% {
                box-shadow: 0 -2em;
                height: 5em;
            }
        }
    </style>
</head>
<body bottomMargin="0" leftMargin="0" topMargin="0" rightMargin="0" ondragstart="return false;"
      style="BACKGROUND-COLOR: transparent">
    <div id="BusyBoxDiv" align="center" style="  width: 420px;
            height: 168px;
            position: absolute;
            border: 2px solid steelblue;
            border-radius: 10px;
            background: white;">
        <div class="busybiz">
        </div>
        <div id="LoaderPopup">
            <a id="loader"></a>
        </div>
        <a id="text">We are processing your request ...</a>
    </div>

</body>
</html>
